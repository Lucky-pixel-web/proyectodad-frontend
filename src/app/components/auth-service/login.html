<div class="login-container d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card login-card p-4 shadow-sm border-0 text-center" style="max-width: 400px; width: 100%; border-radius: 12px;">
    
    <div class="logo-wrapper mx-auto mb-3 d-flex align-items-center justify-content-center bg-primary text-white" 
         style="width: 60px; height: 60px; border-radius: 50%; background-color: #4f46e5 !important;">
      <span style="font-size: 28px;">🔨</span>
    </div>

    <h4 class="fw-bold mb-1" style="color: #111827; font-size: 22px;">Sistema de Inventario</h4>
    <p class="text-muted small mb-4" style="font-size: 13px;">Empresa Java - Constructora e Inmobiliaria</p>

    <div class="alert alert-danger py-2 small mb-3 text-start" role="alert" *ngIf="errorMessage" style="border-radius: 6px; font-size: 12px;">
      📍 {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      
      <div class="mb-3 text-start">
        <label class="form-label small fw-semibold text-secondary mb-1" style="font-size: 12px;">Usuario</label>
        <input 
          type="text" 
          class="form-control bg-light border-0 py-2 text-dark" 
          formControlName="username" 
          placeholder="Ingrese su usuario" 
          style="border-radius: 6px; font-size: 14px;" 
          [ngClass]="{'is-invalid': loginForm.get('username')?.touched && loginForm.get('username')?.invalid}" />
        
        <div class="form-text text-danger small mt-1" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.errors?.['required']">
          El usuario es obligatorio.
        </div>
      </div>

      <div class="mb-4 text-start">
        <label class="form-label small fw-semibold text-secondary mb-1" style="font-size: 12px;">Contraseña</label>
        <input 
          type="password" 
          class="form-control bg-light border-0 py-2 text-dark" 
          formControlName="password" 
          placeholder="Ingrese su contraseña" 
          style="border-radius: 6px; font-size: 14px;"
          [ngClass]="{'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}" />
        
        <div class="form-text text-danger small mt-1" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          La contraseña es obligatoria.
        </div>
      </div>

      <button 
        type="submit" 
        class="btn btn-dark w-100 py-2 fw-semibold mb-3" 
        [disabled]="loginForm.invalid || cargando" 
        style="border-radius: 6px; background-color: #0d1117; font-size: 14px; border: none;">
        
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" *ngIf="cargando"></span>
        {{ cargando ? 'Autenticando...' : 'Iniciar Sesión' }}
      </button>

    </form>

    <div class="p-3 border text-start mt-2" style="font-size: 11px; border-radius: 8px; background-color: #f8fafc; border-color: #e2e8f0 !important;">
      <span class="fw-bold text-secondary d-block mb-1" style="color: #64748b;">Usuario de prueba:</span>
      <div class="text-muted" style="color: #475569;"><strong style="color: #334155;">Usuario:</strong> jesse</div>
      <div class="text-muted" style="color: #475569;"><strong style="color: #334155;">Contraseña:</strong> cualquier contraseña</div>
    </div>

  </div>
</div>
